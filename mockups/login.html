<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dasbor Desa</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .login-header {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            color: white;
            padding: 2rem;
            text-align: center;
            border-radius: 1rem 1rem 0 0;
        }
    </style>
</head>
<body>

    <div class="card login-card">
        <div class="login-header">
            <i class="bi bi-house-door fs-1"></i>
            <h4 class="mt-2 fw-bold">Dasbor Desa</h4>
            <p class="mb-0 small opacity-75">Sistem Monitoring Internal</p>
        </div>
        <div class="card-body p-4">
            <form action="dashboard_privat.html">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-bold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control bg-light border-start-0" id="username" placeholder="Masukkan username" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label small fw-bold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control bg-light border-start-0" id="password" placeholder="Masukkan password" required>
                    </div>
                </div>
                <div class="mb-3 d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label small" for="remember">Ingat saya</label>
                    </div>
                    <a href="#" class="small text-decoration-none">Lupa password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Masuk ke Sistem</button>
            </form>
            <div class="mt-4 text-center">
                <a href="../index.html" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left me-1"></i> Kembali ke Landing Page</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
